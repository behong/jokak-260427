<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      color: #17202a;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }
    form {
      width: min(360px, calc(100vw - 32px));
      background: white;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 22px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 20px;
      letter-spacing: 0;
    }
    label {
      display: block;
      color: #667085;
      font-size: 12px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid #d7dde5;
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
    }
    button {
      width: 100%;
      height: 40px;
      margin-top: 14px;
      border: 1px solid #1769aa;
      border-radius: 6px;
      background: #1769aa;
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      min-height: 18px;
      color: #b42318;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <form method="post">
    <h1>Dashboard Login</h1>
    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" autofocus required>
    <button type="submit">로그인</button>
    <div class="error">{{ error }}</div>
  </form>
</body>
</html>
