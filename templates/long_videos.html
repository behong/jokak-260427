<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>긴영상</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --accent: #1769aa;
      --accent-soft: #e7f0f8;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .subtle,
    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .top-menu,
    .row-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-menu { margin-top: 14px; }

    .top-menu a,
    button,
    .mini-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      background: #fff;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .top-menu a.active,
    button.primary {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    button.primary {
      color: #fff;
      background: var(--accent);
    }

    .mini-button {
      height: 32px;
      font-size: 12px;
      padding: 0 10px;
    }

    .danger {
      border-color: var(--danger);
      color: var(--danger);
      background: #fff;
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 20px 24px 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .section-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .create-bar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 6px;
    }

    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      padding: 0 10px;
      font: inherit;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: var(--text);
      font-size: 13px;
    }

    .option-row input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .stat label {
      margin: 0 0 6px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .background-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .video-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      min-width: 0;
    }

    .video-card video {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      display: block;
      margin-bottom: 10px;
    }

    .video-card strong {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .background-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      min-width: 0;
    }

    .background-card video {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      background: #000;
      border-radius: 6px;
      display: block;
      margin-bottom: 8px;
    }

    .background-card strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 36px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header { padding: 16px; }
      main { padding: 16px; }
      .header-row,
      .section-title { flex-direction: column; }
      .create-bar,
      .stats,
      .video-grid,
      .background-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>긴영상</h1>
        <div class="subtle">힐링 배경 영상과 낭독 오디오로 긴 영상을 수동 생성합니다.</div>
      </div>
      {% if auth_enabled %}
      <form method="post" action="/logout">
        <button type="submit">로그아웃</button>
      </form>
      {% endif %}
    </div>
    <nav class="top-menu" aria-label="상단 메뉴">
      <a href="/">대시보드</a>
      <a href="/manual">수동 좋은글</a>
      <a href="/generated-videos">생성영상</a>
      <a class="active" href="/long-videos">긴영상</a>
      <a href="/background-library">배경영상</a>
      <a href="/settings">운영 설정</a>
    </nav>
  </header>

  <main>
    <section class="panel" aria-label="긴영상 배경 소스">
      <div class="section-title">
        <div>
          <h2>사용할 힐링 배경</h2>
          <div class="subtle" id="backgroundStatus">불러오는 중</div>
        </div>
        <button type="button" id="refreshBackgrounds">새로고침</button>
      </div>
      <div class="background-grid" id="backgroundGrid"></div>
    </section>

    <section class="panel" aria-label="긴영상 생성">
      <div class="section-title">
        <div>
          <h2>긴영상 만들기</h2>
          <div class="subtle">위 배경 소스를 전체 화면으로 사용하고, 업로드 완료된 짧은 영상은 낭독 재료로만 사용합니다.</div>
        </div>
      </div>

      <div class="create-bar">
        <div>
          <label>생성 상태</label>
          <div class="status" id="longVideoStatus">대기 중</div>
          <label class="option-row">
            <input id="includeUsedSources" type="checkbox">
            이미 긴영상에 사용한 짧은 영상도 포함
          </label>
        </div>
        <button class="primary" type="button" id="createLongVideo">긴영상 만들기</button>
        <button type="button" id="refreshCandidates">재료 확인</button>
      </div>

      <div class="stats">
        <div class="stat">
          <label>사용 가능 재료</label>
          <strong id="candidateCount">-</strong>
        </div>
        <div class="stat">
          <label>예상 길이</label>
          <strong id="candidateDuration">-</strong>
        </div>
        <div class="stat">
          <label>생성 가능</label>
          <strong id="candidateReady">-</strong>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="긴영상 목록">
      <div class="section-title">
        <div>
          <h2>긴영상 목록</h2>
          <div class="subtle" id="videoLibraryStatus">불러오는 중</div>
        </div>
        <button type="button" id="refreshVideoLibrary">새로고침</button>
      </div>
      <div class="video-grid" id="videoLibrary"></div>
    </section>
  </main>

  <script>
    const backgroundGrid = document.querySelector("#backgroundGrid");
    const backgroundStatus = document.querySelector("#backgroundStatus");
    const refreshBackgrounds = document.querySelector("#refreshBackgrounds");
    const longVideoStatus = document.querySelector("#longVideoStatus");
    const includeUsedSources = document.querySelector("#includeUsedSources");
    const createLongVideo = document.querySelector("#createLongVideo");
    const refreshCandidates = document.querySelector("#refreshCandidates");
    const candidateCount = document.querySelector("#candidateCount");
    const candidateDuration = document.querySelector("#candidateDuration");
    const candidateReady = document.querySelector("#candidateReady");
    const videoLibrary = document.querySelector("#videoLibrary");
    const videoLibraryStatus = document.querySelector("#videoLibraryStatus");
    const refreshVideoLibrary = document.querySelector("#refreshVideoLibrary");

    function escapeText(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (value < 1024) return `${value}B`;
      if (value < 1024 * 1024) return `${Math.round(value / 1024)}KB`;
      if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)}MB`;
      return `${(value / 1024 / 1024 / 1024).toFixed(2)}GB`;
    }

    function formatDuration(seconds) {
      const value = Math.max(0, Math.round(Number(seconds || 0)));
      return `${Math.floor(value / 60)}분 ${value % 60}초`;
    }

    function videoLabel(video) {
      return video.title || video.filename;
    }

    async function readJson(response) {
      const contentType = response.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        return response.json();
      }
      const text = await response.text();
      throw new Error(`JSON 응답이 아닙니다: HTTP ${response.status} ${text.slice(0, 80)}`);
    }

    async function loadBackgrounds() {
      backgroundStatus.textContent = "불러오는 중";
      const response = await fetch("/api/long-videos/backgrounds");
      const payload = await readJson(response);
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      const backgrounds = payload.backgrounds || [];
      backgroundStatus.textContent = `${payload.collection || "-"} / ${backgrounds.length}개`;
      if (!backgrounds.length) {
        backgroundGrid.innerHTML = '<div class="empty">긴영상 전용 힐링 배경이 없습니다</div>';
        return;
      }
      backgroundGrid.innerHTML = backgrounds.map((item) => `
        <div class="background-card">
          <video src="${escapeText(item.video_url || "")}" poster="${escapeText(item.preview_url || "")}" muted controls playsinline preload="metadata"></video>
          <strong>${escapeText(item.author || item.provider || "background")}</strong>
          <div class="subtle">${escapeText(formatDuration(item.duration || 0))} / ${escapeText(`${item.width || "-"}x${item.height || "-"}`)}</div>
        </div>
      `).join("");
    }

    async function loadCandidates() {
      const params = new URLSearchParams({
        include_used: includeUsedSources.checked ? "1" : "0"
      });
      const response = await fetch(`/api/long-videos/candidates?${params.toString()}`);
      const payload = await readJson(response);
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      candidateCount.textContent = `${payload.count || 0}개`;
      candidateDuration.textContent = formatDuration(payload.effective_seconds || payload.total_seconds || 0);
      candidateReady.textContent = payload.ready ? "가능" : "부족";
      longVideoStatus.textContent = payload.ready
        ? "긴영상 생성 가능"
        : "10분 이상을 만들 재료가 아직 부족합니다.";
    }

    async function loadVideoLibrary() {
      videoLibraryStatus.textContent = "불러오는 중";
      const params = new URLSearchParams({ limit: "50", type: "long" });
      const response = await fetch(`/api/videos?${params.toString()}`);
      const payload = await readJson(response);
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      const videos = payload.videos || [];
      if (!videos.length) {
        videoLibrary.innerHTML = '<div class="empty">생성된 긴영상이 없습니다</div>';
        videoLibraryStatus.textContent = "0개";
        return;
      }
      videoLibrary.innerHTML = videos.map((video) => `
        <div class="video-card">
          <video src="${escapeText(video.video_url)}?t=${Date.now()}" controls playsinline></video>
          <strong>${escapeText(videoLabel(video))}</strong>
          <div class="subtle">${escapeText(formatDate(video.modified_at * 1000))} / ${formatBytes(video.size)}</div>
          <div class="row-tools">
            <a class="mini-button" href="${escapeText(video.video_url)}" target="_blank" rel="noreferrer">열기</a>
            <button class="mini-button danger delete-video" type="button" data-filename="${escapeText(video.filename)}">삭제</button>
          </div>
        </div>
      `).join("");
      videoLibraryStatus.textContent = `${videos.length}개`;
    }

    async function pollLongVideoJob(jobId) {
      for (;;) {
        await new Promise((resolve) => setTimeout(resolve, 2500));
        const response = await fetch(`/api/long-videos/jobs/${jobId}`);
        const payload = await readJson(response);
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        const job = payload.job;
        longVideoStatus.textContent = `${job.stage || job.status} (${job.progress || 0}%)`;
        if (job.status === "ready") {
          longVideoStatus.innerHTML = `긴영상 생성 완료: <a href="${escapeText(job.video_url)}" target="_blank" rel="noreferrer">${escapeText(job.video_url)}</a>`;
          await loadCandidates();
          await loadVideoLibrary();
          return job;
        }
        if (job.status === "failed") {
          throw new Error(job.error || "긴영상 생성 실패");
        }
      }
    }

    createLongVideo.addEventListener("click", async () => {
      createLongVideo.disabled = true;
      longVideoStatus.textContent = "긴영상 생성 요청 중";
      try {
        const response = await fetch("/api/long-videos/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ include_used: includeUsedSources.checked })
        });
        const payload = await readJson(response);
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        await pollLongVideoJob(payload.job.id);
      } catch (error) {
        longVideoStatus.textContent = error.message || "긴영상 생성 실패";
        console.error(error);
      } finally {
        createLongVideo.disabled = false;
      }
    });

    refreshCandidates.addEventListener("click", () => {
      loadCandidates().catch((error) => {
        longVideoStatus.textContent = error.message || "재료 확인 실패";
      });
    });

    includeUsedSources.addEventListener("change", () => {
      loadCandidates().catch((error) => {
        longVideoStatus.textContent = error.message || "재료 확인 실패";
      });
    });

    refreshBackgrounds.addEventListener("click", () => {
      loadBackgrounds().catch((error) => {
        backgroundStatus.textContent = error.message || "배경 소스 로드 실패";
      });
    });

    refreshVideoLibrary.addEventListener("click", () => {
      loadVideoLibrary().catch((error) => {
        videoLibraryStatus.textContent = error.message || "긴영상 목록 로드 실패";
      });
    });

    videoLibrary.addEventListener("click", async (event) => {
      const button = event.target.closest(".delete-video");
      if (!button) return;
      if (!confirm("이 긴영상을 삭제할까요?")) return;
      button.disabled = true;
      const video = button.closest(".video-card")?.querySelector("video");
      if (video) {
        video.pause();
        video.removeAttribute("src");
        video.load();
      }
      try {
        const response = await fetch(`/api/videos/${encodeURIComponent(button.dataset.filename)}`, {
          method: "DELETE"
        });
        const payload = await readJson(response);
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        await loadVideoLibrary();
      } catch (error) {
        longVideoStatus.textContent = error.message || "삭제 실패";
      } finally {
        button.disabled = false;
      }
    });

    loadBackgrounds().catch((error) => {
      backgroundStatus.textContent = error.message || "배경 소스 로드 실패";
    });
    loadCandidates().catch((error) => {
      longVideoStatus.textContent = error.message || "재료 확인 실패";
    });
    loadVideoLibrary().catch((error) => {
      videoLibraryStatus.textContent = error.message || "긴영상 목록 로드 실패";
    });
  </script>
</body>
</html>
