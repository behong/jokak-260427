<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>수동 좋은글</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --accent: #1769aa;
      --accent-soft: #e7f0f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
    }

    .top-menu {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .top-menu a {
      display: inline-flex;
      align-items: center;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .top-menu a.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 20px 24px 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      font: inherit;
      padding: 10px 12px;
      line-height: 1.55;
    }

    button {
      height: 38px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .secondary,
    .logout button {
      background: #fff;
      color: var(--accent);
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }

    @media (max-width: 820px) {
      header { padding: 16px; }
      main { padding: 16px; }
      .header-row,
      .section-title {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>수동 좋은글</h1>
        <div class="subtle">DB: {{ db_path }}</div>
      </div>
      {% if auth_enabled %}
      <form class="logout" method="post" action="/logout">
        <button type="submit">로그아웃</button>
      </form>
      {% endif %}
    </div>
    <nav class="top-menu" aria-label="상단 메뉴">
      <a href="/">대시보드</a>
      <a class="active" href="/manual">수동 좋은글</a>
      <a href="/generated-videos">생성영상</a>
      <a href="/background-library">배경영상</a>
      <a href="/settings">운영 설정</a>
    </nav>
  </header>

  <main>
    <section class="panel" aria-label="수동 좋은글 입력">
      <div class="section-title">
        <div>
          <h2>수동 좋은글</h2>
          <div class="subtle">직접 입력한 글을 저장하고 바로 영상 대본을 만들 수 있습니다</div>
        </div>
        <button type="button" id="createManualScript">대본 만들기</button>
      </div>
      <textarea id="manualContent" placeholder="영상으로 만들 좋은글을 붙여넣으세요. 출처가 있으면 마지막 줄에 함께 넣어도 됩니다."></textarea>
      <div class="status" id="manualStatus"></div>
    </section>
  </main>

  <script>
    const manualContent = document.querySelector("#manualContent");
    const manualStatus = document.querySelector("#manualStatus");
    const createManualScript = document.querySelector("#createManualScript");

    createManualScript.addEventListener("click", async () => {
      const content = manualContent.value.trim();
      if (content.length < 10) {
        manualStatus.textContent = "좋은글을 10자 이상 입력하세요";
        return;
      }
      createManualScript.disabled = true;
      manualStatus.textContent = "저장 중";
      try {
        const response = await fetch("/api/manual-logs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        manualStatus.textContent = "저장 완료";
        window.location.href = `/?open_log=${encodeURIComponent(payload.id)}`;
      } catch (error) {
        manualStatus.textContent = error.message || "수동 글 저장 실패";
        console.error(error);
      } finally {
        createManualScript.disabled = false;
      }
    });
  </script>
</body>
</html>
