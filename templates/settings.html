<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>운영 설정</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --accent: #1769aa;
      --accent-soft: #e7f0f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
    }

    .top-menu {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .top-menu a {
      display: inline-flex;
      align-items: center;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .top-menu a.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 20px 24px 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    select,
    input {
      height: 38px;
      padding: 0 10px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      padding: 10px 12px;
      line-height: 1.55;
    }

    .check-field {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }

    .check-field input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .row-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      height: 38px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      padding: 0 14px;
      cursor: pointer;
    }

    .secondary,
    .logout button {
      background: #fff;
      color: var(--accent);
    }

    .notice {
      color: var(--muted);
      font-size: 12px;
      margin: 10px 2px 0;
      min-height: 18px;
      text-align: right;
    }

    @media (max-width: 820px) {
      header { padding: 16px; }
      main { padding: 16px; }
      .header-row,
      .section-title {
        align-items: stretch;
        flex-direction: column;
      }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>운영 설정</h1>
        <div class="subtle">DB: {{ db_path }}</div>
      </div>
      {% if auth_enabled %}
      <form class="logout" method="post" action="/logout">
        <button type="submit">로그아웃</button>
      </form>
      {% endif %}
    </div>
    <nav class="top-menu" aria-label="상단 메뉴">
      <a href="/">대시보드</a>
      <a href="/manual">수동 좋은글</a>
      <a href="/generated-videos">생성영상</a>
      <a href="/background-library">배경영상</a>
      <a class="active" href="/settings">운영 설정</a>
    </nav>
  </header>

  <main>
    <section class="panel" aria-label="운영 설정">
      <div class="section-title">
        <div>
          <h2>운영 설정</h2>
          <div class="subtle" id="settingsStatus">설정을 불러오는 중</div>
        </div>
        <div class="row-tools">
          <button class="secondary" type="button" id="reloadSettings">새로고침</button>
          <button type="button" id="saveSettings">저장</button>
        </div>
      </div>
      <div class="settings-grid">
        <div class="field">
          <label for="settingTelegramApiId">Telegram API ID</label>
          <input id="settingTelegramApiId" data-setting="TELEGRAM_API_ID" autocomplete="off">
        </div>
        <div class="field">
          <label for="settingTelegramApiHash">Telegram API HASH</label>
          <input id="settingTelegramApiHash" data-setting="TELEGRAM_API_HASH" type="password" autocomplete="new-password" placeholder="변경할 때만 입력">
        </div>
        <div class="field">
          <label for="settingPexelsApiKey">Pexels API Key</label>
          <input id="settingPexelsApiKey" data-setting="PEXELS_API_KEY" type="password" autocomplete="new-password" placeholder="변경할 때만 입력">
        </div>
        <div class="field">
          <label for="settingDashboardPassword">대시보드 비밀번호</label>
          <input id="settingDashboardPassword" data-setting="DASHBOARD_PASSWORD" type="password" autocomplete="new-password" placeholder="변경할 때만 입력">
        </div>
        <div class="field">
          <label for="settingCatchUpLimit">과거글 보정 수집</label>
          <input id="settingCatchUpLimit" data-setting="TELEGRAM_CATCH_UP_LIMIT" type="number" min="0" max="100" step="1">
        </div>
        <div class="field">
          <label for="settingBgmEnabled">BGM 자동 삽입</label>
          <input id="settingBgmEnabled" data-setting="VIDEO_BGM_ENABLED" type="checkbox">
        </div>
        <div class="field">
          <label for="settingBgmTtsVolume">BGM 볼륨(TTS)</label>
          <input id="settingBgmTtsVolume" data-setting="VIDEO_BGM_TTS_VOLUME" type="number" min="0" max="1" step="0.01">
        </div>
        <div class="field">
          <label for="settingBgmOnlyVolume">BGM 볼륨(무음)</label>
          <input id="settingBgmOnlyVolume" data-setting="VIDEO_BGM_ONLY_VOLUME" type="number" min="0" max="1" step="0.01">
        </div>
      </div>
      <div class="field">
        <label for="youtubeClientSecretJson">YouTube client_secret.json</label>
        <textarea id="youtubeClientSecretJson" placeholder="Google Cloud에서 받은 OAuth JSON을 교체할 때만 붙여넣기"></textarea>
      </div>
      <div class="notice" id="settingsDetail"></div>
    </section>
  </main>

  <script>
    const reloadSettings = document.querySelector("#reloadSettings");
    const saveSettings = document.querySelector("#saveSettings");
    const settingsStatus = document.querySelector("#settingsStatus");
    const settingsDetail = document.querySelector("#settingsDetail");
    const settingInputs = [...document.querySelectorAll("[data-setting]")];
    const youtubeClientSecretJson = document.querySelector("#youtubeClientSecretJson");

    function settingValueFromInput(input) {
      if (input.type === "checkbox") {
        return input.checked ? "1" : "0";
      }
      return input.value.trim();
    }

    function applySettings(payload) {
      const settings = payload.settings || {};
      settingInputs.forEach((input) => {
        const name = input.dataset.setting;
        const value = settings[name] || "";
        if (input.type === "checkbox") {
          input.checked = value === "1" || value === "true";
        } else if (input.type === "password") {
          input.value = "";
          input.placeholder = value ? `${value} / 변경할 때만 입력` : "변경할 때만 입력";
        } else {
          input.value = value;
        }
      });
      const status = payload.status || {};
      settingsDetail.textContent = [
        `env ${status.env_exists ? "OK" : "없음"}`,
        `Telegram 세션 ${status.telegram_session_exists ? "OK" : "없음"}`,
        `YouTube OAuth ${status.youtube_client_exists ? "OK" : "없음"}`,
        `YouTube 토큰 ${status.youtube_token_valid ? "OK" : (status.youtube_token_exists ? "재인증 필요" : "없음")}`,
        `Pexels ${status.pexels_key_exists ? "OK" : "없음"}`,
        `DB ${status.db_exists ? "OK" : "없음"}`
      ].join(" / ");
    }

    async function loadSettings() {
      settingsStatus.textContent = "설정을 불러오는 중";
      const response = await fetch("/api/settings");
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      applySettings(payload);
      settingsStatus.textContent = "설정 로드 완료";
    }

    async function saveOperationSettings() {
      saveSettings.disabled = true;
      settingsStatus.textContent = "설정 저장 중";
      const settings = {};
      settingInputs.forEach((input) => {
        const name = input.dataset.setting;
        const value = settingValueFromInput(input);
        if (input.type === "password" && !value) return;
        settings[name] = value;
      });
      try {
        const response = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            settings,
            youtube_client_secret_json: youtubeClientSecretJson.value.trim()
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        youtubeClientSecretJson.value = "";
        applySettings(payload);
        settingsStatus.textContent = `저장 완료: ${payload.updated.join(", ") || "변경 없음"}`;
      } catch (error) {
        settingsStatus.textContent = error.message || "설정 저장 실패";
        console.error(error);
      } finally {
        saveSettings.disabled = false;
      }
    }

    reloadSettings.addEventListener("click", async () => {
      try {
        await loadSettings();
      } catch (error) {
        settingsStatus.textContent = error.message || "설정 로드 실패";
        console.error(error);
      }
    });
    saveSettings.addEventListener("click", saveOperationSettings);
    loadSettings().catch((error) => {
      settingsStatus.textContent = error.message || "설정 로드 실패";
      console.error(error);
    });
  </script>
</body>
</html>
